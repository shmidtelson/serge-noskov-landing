# Deploy Astro static `dist/` to GitHub Pages (official Actions flow).
#
# Required once per repo: Settings → Pages → Build and deployment
#   → Source: "GitHub Actions" (not "Deploy from a branch").
#   If you see 404 on "Deploy to GitHub Pages", the Pages API is disabled until
#   that source is set. Public repos: Pages is free. Private: needs a plan with Pages.
#
# GITHUB_REPOSITORY is set by the runner; astro.config.mjs uses it for site + base.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install and build
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
